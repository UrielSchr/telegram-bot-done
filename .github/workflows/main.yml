name: Telegram Product Bot

on:
  schedule:
    # רץ בכל שעה עגולה, ימים ראשון עד חמישי
    # 07:00 עד 19:00 UTC זה 09:00 עד 21:00 בישראל (שעון חורף)
    - cron: '0 7-19 * * 0-4'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl pyTelegramBotAPI

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
